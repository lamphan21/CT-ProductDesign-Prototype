<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platform — Chợ Tốt Work</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand:        #FFBA00;
      --brand-dim:    rgba(255,186,0,0.12);
      --brand-glow:   rgba(255,186,0,0.25);

      --bg-base:      #0E0E0E;
      --bg-surface:   #1A1A1A;
      --bg-elevated:  #242424;
      --bg-hover:     #2C2C2C;

      --text-primary:   #F5F5F5;
      --text-secondary: #9A9A9A;
      --text-tertiary:  #5A5A5A;

      --border:       rgba(255,255,255,0.08);
      --border-brand: rgba(255,186,0,0.4);

      --font: 'Be Vietnam Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font);
      background: var(--bg-base);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: 56px;
      background: rgba(14,14,14,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-secondary);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .back-btn svg { width: 16px; height: 16px; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
    }

    .logo-icon img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-badge {
      font-size: 9px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-left: 2px;
      align-self: flex-end;
      padding-bottom: 2px;
    }

    .header-pill {
      font-size: 11px;
      font-weight: 700;
      color: var(--brand);
      background: var(--brand-dim);
      border: 1px solid var(--border-brand);
      border-radius: 100px;
      padding: 4px 12px;
      letter-spacing: 0.5px;
    }

    /* ── Hero ─────────────────────────────────────────────── */
    .hero {
      padding: 100px 20px 0;
      max-width: 480px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 14px;
    }

    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 20px;
      height: 2px;
      background: var(--brand);
      border-radius: 2px;
    }

    .hero h1 {
      font-size: 30px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--brand);
    }

    .hero p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    /* ── Divider ─────────────────────────────────────────── */
    .divider {
      max-width: 480px;
      margin: 28px auto 0;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Coming Soon Card ────────────────────────────────── */
    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 20px 48px;
    }

    .coming-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .coming-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top center, var(--brand-glow) 0%, transparent 60%);
      opacity: 0.5;
      pointer-events: none;
    }

    .coming-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--brand-dim);
      border: 1px solid var(--border-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .coming-icon svg { width: 28px; height: 28px; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
    }

    .coming-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .coming-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.65;
      max-width: 300px;
      margin-bottom: 28px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--brand);
      text-decoration: none;
      padding: 9px 18px;
      border: 1px solid var(--border-brand);
      border-radius: 100px;
      background: var(--brand-dim);
      transition: background 0.15s, border-color 0.15s;
    }

    .back-link:hover {
      background: rgba(255,186,0,0.18);
      border-color: var(--brand);
    }

    .back-link svg { width: 14px; height: 14px; }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      text-align: center;
      padding-bottom: 32px;
      font-size: 12px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <a href="../index.html" class="back-btn" aria-label="Back">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 12l-4-4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <a href="../index.html" class="logo">
        <div class="logo-icon">
          <img src="../image/CT-logo2026.png" alt="Chợ Tốt" />
        </div>
        <span class="logo-badge">Chợ Tốt Product Designer</span>
      </a>
    </div>
    <div class="header-pill">Platform</div>
  </header>

  <div class="hero">
    <div class="hero-eyebrow">Section</div>
    <h1>Platform</h1>
    <p>Core platform features &amp; management.</p>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-label">Status</span>
    <div class="divider-line"></div>
  </div>

  <div class="content">
    <div class="coming-card">
      <div class="coming-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="20" height="13" rx="2" stroke="#FFBA00" stroke-width="1.8"/>
          <path d="M8 21h8M12 16v5" stroke="#FFBA00" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        In Progress
      </div>
      <div class="coming-title">Coming Soon</div>
      <p class="coming-desc">The Platform section is currently under construction. Check back soon for updates.</p>
      <a href="../index.html" class="back-link">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M10 12l-4-4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Home
      </a>
    </div>
  </div>

  <footer>v3.0 CHOTOT Design System</footer>

</body>
</html>
