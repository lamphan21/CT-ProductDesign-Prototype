  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chợ Tốt Work</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand:        #FFBA00;
      --brand-dim:    rgba(255,186,0,0.12);
      --brand-glow:   rgba(255,186,0,0.25);

      --bg-base:      #0E0E0E;
      --bg-surface:   #1A1A1A;
      --bg-elevated:  #242424;
      --bg-hover:     #2C2C2C;

      --text-primary:   #F5F5F5;
      --text-secondary: #9A9A9A;
      --text-tertiary:  #5A5A5A;

      --border:       rgba(255,255,255,0.08);
      --border-brand: rgba(255,186,0,0.4);

      --font: 'Be Vietnam Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font);
      background: var(--bg-base);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: 56px;
      background: rgba(14,14,14,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    /* Logo icon */
    .logo-icon {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
    }

    .logo-icon img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-badge {
      font-size: 9px;
      font-weight: 600;
      color: #FFFFFF;
      display: block;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-left: 2px;
      align-self: flex-end;
      padding-bottom: 2px;
    }

    .header-pill {
      font-size: 11px;
      font-weight: 700;
      color: var(--brand);
      background: var(--brand-dim);
      border: 1px solid var(--border-brand);
      border-radius: 100px;
      padding: 4px 12px;
      letter-spacing: 0.5px;
    }

    /* ── Hero ─────────────────────────────────────────────── */
    .hero {
      padding: 100px 20px 0;
      max-width: 480px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 14px;
    }

    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 20px;
      height: 2px;
      background: var(--brand);
      border-radius: 2px;
    }

    .hero h1 {
      font-size: 30px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--brand);
    }

    .hero p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    /* ── Divider ─────────────────────────────────────────── */
    .divider {
      max-width: 480px;
      margin: 28px auto 0;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Cards ───────────────────────────────────────────── */
    .cards {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      text-decoration: none;
      color: var(--text-primary);
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      background: var(--bg-hover);
      border-color: var(--border-brand);
      transform: translateY(-1px);
    }

    /* Glow on hover */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at left center, var(--brand-glow) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .card:hover::before { opacity: 1; }

    /* Icon */
    .card-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: var(--brand-dim);
      border: 1px solid var(--border-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.18s ease;
    }

    .card:hover .card-icon {
      background: rgba(255,186,0,0.18);
    }

    .card-icon svg { width: 22px; height: 22px; }

    /* Body */
    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .card-desc {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    /* Arrow */
    .card-arrow {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      transition: background 0.18s, color 0.18s;
    }

    .card:hover .card-arrow {
      background: var(--brand);
      color: #000;
    }

    .card-arrow svg { width: 16px; height: 16px; }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      text-align: center;
      padding-bottom: 32px;
      font-size: 12px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <img src="image/CT-logo2026.png" alt="Chợ Tốt" />
      </div>
      <span class="logo-badge">Chợ Tốt<br>Product Designer</span>
    </a>
    <div class="header-pill">Workspace</div>
  </header>

  <div class="hero">
    <div class="hero-eyebrow">Dashboard</div>
    <h1>Chào mừng<br/>trở lại <em>👋</em></h1>
    <p>Chọn một khu vực để bắt đầu làm việc.</p>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-label">Sections</span>
    <div class="divider-line"></div>
  </div>

  <div class="cards">

    <!-- Platform -->
    <a href="Platform/Platform.html" class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="20" height="13" rx="2" stroke="#FFBA00" stroke-width="1.8"/>
          <path d="M8 21h8M12 16v5" stroke="#FFBA00" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-title">Platform</div>
        <div class="card-desc">Core platform features &amp; management</div>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <!-- User -->
    <a href="User/User.html" class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="8" r="4" stroke="#FFBA00" stroke-width="1.8"/>
          <path d="M4 20c0-3.314 3.582-6 8-6s8 2.686 8 6" stroke="#FFBA00" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-title">User</div>
        <div class="card-desc">User accounts, profiles &amp; settings</div>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <!-- Buyer -->
    <a href="Buyer/Buyer.html" class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#FFBA00" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M3 6h18M16 10a4 4 0 01-8 0" stroke="#FFBA00" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-title">Buyer</div>
        <div class="card-desc">Buyer experience &amp; purchase flows</div>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

  </div>

  <footer>v3.0 CHOTOT Design System</footer>

</body>
</html>
